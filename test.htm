<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Three.js Low Poly Environment Props</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #f3eadc; }
  canvas { display: block; }
  .editor-panel {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 10;
    width: 280px;
    padding: 12px;
    border: 1px solid rgba(32, 32, 32, 0.16);
    border-radius: 8px;
    background: rgba(250, 246, 237, 0.92);
    box-shadow: 0 12px 30px rgba(40, 28, 12, 0.18);
    color: #202020;
    font: 13px/1.35 Arial, sans-serif;
    backdrop-filter: blur(10px);
  }
  .editor-panel h1 {
    margin: 0 0 8px;
    font-size: 14px;
    letter-spacing: 0;
    text-transform: uppercase;
  }
  .editor-status {
    min-height: 34px;
    margin: 0 0 10px;
    color: #3d362c;
  }
  .editor-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .editor-panel button {
    height: 30px;
    padding: 0 10px;
    border: 1px solid rgba(32, 32, 32, 0.18);
    border-radius: 6px;
    background: #fffaf0;
    color: #202020;
    font: inherit;
    cursor: pointer;
  }
  .editor-panel button[aria-pressed="true"] {
    background: #202020;
    color: #fffaf0;
  }
  .editor-panel button:disabled,
  .editor-panel input:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }
  .editor-grid {
    display: grid;
    grid-template-columns: 70px repeat(3, 1fr);
    gap: 6px;
    align-items: center;
  }
  .editor-grid strong {
    font-size: 11px;
    text-transform: uppercase;
  }
  .editor-grid span {
    color: #5c5143;
    font-size: 12px;
  }
  .editor-grid input {
    min-width: 0;
    height: 28px;
    box-sizing: border-box;
    border: 1px solid rgba(32, 32, 32, 0.14);
    border-radius: 5px;
    background: #fffdf7;
    color: #202020;
    font: 12px Arial, sans-serif;
    padding: 0 5px;
  }
  .editor-hint {
    margin: 10px 0 0;
    color: #6f6251;
    font-size: 12px;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div class="editor-panel" id="editorPanel">
  <h1>Asset Editor</h1>
  <p class="editor-status" id="editorStatus">Click an object to select it.</p>
  <div class="editor-actions">
    <button type="button" id="editButton" disabled>Edit</button>
    <button type="button" id="resetButton" disabled>Reset part</button>
  </div>
  <div class="editor-grid" id="editorControls">
    <span></span><strong>X</strong><strong>Y</strong><strong>Z</strong>
    <strong>Size</strong>
    <input id="sizeX" type="number" step="0.05" min="0.02" disabled />
    <input id="sizeY" type="number" step="0.05" min="0.02" disabled />
    <input id="sizeZ" type="number" step="0.05" min="0.02" disabled />
    <strong>Position</strong>
    <input id="posX" type="number" step="0.05" disabled />
    <input id="posY" type="number" step="0.05" disabled />
    <input id="posZ" type="number" step="0.05" disabled />
  </div>
  <p class="editor-hint">Select an object, press Edit, then click a part.</p>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf3eadc);
scene.fog = new THREE.Fog(0xf3eadc, 65, 150);

const camera = new THREE.PerspectiveCamera(28, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(28, 34, 76);
camera.lookAt(0, 1, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 1, 22);
controls.minDistance = 8;
controls.maxDistance = 160;

const hemi = new THREE.HemisphereLight(0xffffff, 0xc9b58c, 1.35);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff2d8, 2.25);
sun.position.set(8, 14, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -54;
sun.shadow.camera.right = 54;
sun.shadow.camera.top = 54;
sun.shadow.camera.bottom = -54;
sun.shadow.camera.far = 110;
scene.add(sun);

const M = (color, opts = {}) => new THREE.MeshStandardMaterial({ color, roughness: 1, metalness: 0, flatShading: true, ...opts });
const mats = {
  grass: M(0x9fe34d), grass2: M(0x7fc33b), grass3: M(0xb7f466),
  trunk: M(0x8a5526), trunkDark: M(0x6b3f1e),
  stone: M(0xbec0c2), stoneDark: M(0x888d91),
  wood: M(0x9a5d28), woodLight: M(0xb77735), woodDark: M(0x6f3d17),
  reed: M(0xf2c94c), stem: M(0x4c9d32),
  mushroom: M(0xf4a12d), mushroomStem: M(0xc88b39),
  flower: M(0xffd642), flowerCenter: M(0x4a2d14),
  tileDirt: M(0x9a6638), tileDirtDark: M(0x754828), water: M(0x64c7df), waterDark: M(0x3ca7c5),
  plaster: M(0xf3efe3), plasterDark: M(0xd6d0c1), tileGray: M(0xcac8c1), tileEdge: M(0x787d82),
  sand: M(0xf3dc93), sandDark: M(0xd6b96a),
  blueRoof: M(0x58a8eb), blueRoofDark: M(0x2f6fae),
  white: M(0xf7f3e8), cream: M(0xf6e6c0), black: M(0x252422),
  pink: M(0xf4a3a9), pinkDark: M(0xd87982), yellow: M(0xf5c63d),
  orange: M(0xf28b22), orangeDark: M(0xc76018),
  brown: M(0x8a5a31), brownDark: M(0x4e2e1f),
  tan: M(0xc18a4a), tanLight: M(0xe0bf79),
  gray: M(0x9b9b9b), grayDark: M(0x5d5f61),
  turtle: M(0x5b7f2e), frog: M(0x76b947), blue: M(0x3995c4),
  shadow: M(0x342718, { transparent: true, opacity: 0.12 })
};

const root = new THREE.Group();
scene.add(root);

function tagPart(mesh, type, width, height, depth) {
  mesh.userData.editorPart = {
    type,
    width,
    height,
    depth,
    initialScale: mesh.scale.clone(),
    initialPosition: mesh.position.clone()
  };
  return mesh;
}
function add(mesh, parent = root) {
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}
function bevelRadius(w, h, d, ratio = 0.14, cap = 0.12) {
  return Math.max(0.012, Math.min(w, h, d) * ratio, Math.min(Math.min(w, h, d) * 0.48, cap));
}
function roundedBoxGeometry(w, h, d, radius = bevelRadius(w, h, d), segments = 2) {
  return new RoundedBoxGeometry(w, h, d, segments, radius);
}
function boxGeometryFor(parent, w, h, d, radius) {
  if (parent && parent.userData && (parent.userData.blockyAnimal || parent.userData.blockyBuilding)) {
    return new THREE.BoxGeometry(w, h, d);
  }
  return roundedBoxGeometry(w, h, d, radius);
}
function triangularPrismGeometry(w, h, d) {
  const x = w * 0.5;
  const y = h;
  const z = d * 0.5;
  const vertices = new Float32Array([
    -x, 0, -z, x, 0, -z, 0, y, -z,
    -x, 0, z, 0, y, z, x, 0, z,
    -x, 0, -z, -x, 0, z, x, 0, z,
    -x, 0, -z, x, 0, z, x, 0, -z,
    -x, 0, -z, 0, y, -z, 0, y, z,
    -x, 0, -z, 0, y, z, -x, 0, z,
    x, 0, -z, x, 0, z, 0, y, z,
    x, 0, -z, 0, y, z, 0, y, -z,
    0, y, -z, x, 0, -z, x, 0, z,
    0, y, -z, x, 0, z, 0, y, z
  ]);
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  geometry.computeVertexNormals();
  return geometry;
}
function box(w, h, d, material, x, y, z, parent = root, radius = bevelRadius(w, h, d)) {
  const mesh = new THREE.Mesh(boxGeometryFor(parent, w, h, d, radius), material);
  mesh.position.set(x, y, z);
  return tagPart(add(mesh, parent), 'box', w, h, d);
}
function roof(w, h, d, material, x, y, z, parent = root) {
  const mesh = new THREE.Mesh(triangularPrismGeometry(w, h, d), material);
  mesh.position.set(x, y, z);
  return tagPart(add(mesh, parent), 'roof', w, h, d);
}
function cyl(rt, rb, h, seg, material, x, y, z, parent = root) {
  const isSquarePost = seg <= 4;
  const postWidth = Math.max(rt, rb) * 2;
  const geometry = isSquarePost
    ? roundedBoxGeometry(postWidth, h, postWidth, bevelRadius(postWidth, h, postWidth, 0.16, 0.05), 2)
    : new THREE.CylinderGeometry(rt, rb, h, seg);
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(x, y, z);
  return tagPart(add(mesh, parent), isSquarePost ? 'post' : 'cylinder', postWidth, h, postWidth);
}
function cone(r, h, seg, material, x, y, z, parent = root) {
  const mesh = new THREE.Mesh(new THREE.ConeGeometry(r, h, seg), material);
  mesh.position.set(x, y, z);
  return tagPart(add(mesh, parent), 'cone', r * 2, h, r * 2);
}
function sphere(r, material, x, y, z, parent = root, scale = [1,1,1]) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), material);
  mesh.position.set(x, y, z);
  mesh.scale.set(scale[0], scale[1], scale[2]);
  return tagPart(add(mesh, parent), 'sphere', r * 2, r * 2, r * 2);
}
function makeGroup(x, z, s = 1) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  g.scale.setScalar(s);
  root.add(g);
  return g;
}
function label(text, x, z, y = 0.12, scale = 0.42) {
  const group = root.children.find((child) => child.isGroup && Math.abs(child.position.x - x) < 0.04 && Math.abs(child.position.z - z) < 0.04);
  if (group) group.userData.editorName = text;
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = '700 42px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 8;
  ctx.strokeStyle = 'rgba(243, 234, 220, 0.95)';
  ctx.strokeText(text, 256, 64);
  ctx.fillStyle = '#202020';
  ctx.fillText(text, 256, 64);
  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(material);
  sprite.position.set(x, y, z + 1.02);
  sprite.scale.set(2.0 * scale, 0.5 * scale, 1);
  root.add(sprite);
  return sprite;
}
function labelRow(names, xs, z, scale = 0.34) {
  names.forEach((name, i) => label(name, xs[i], z, 0.12, scale));
}

// Tree variants.
function cubeTree(x, z, scale = 1, levels = 2) {
  const g = makeGroup(x, z, scale);
  cyl(0.18, 0.22, 1.35, 4, mats.trunk, 0, 0.68, 0, g).rotation.y = Math.PI / 4;
  box(1.15, 0.75, 1.15, mats.grass2, 0, 1.45, 0, g);
  if (levels >= 2) box(0.82, 0.55, 0.82, mats.grass, 0, 2.1, 0, g);
  if (levels >= 3) box(0.52, 0.38, 0.52, mats.grass3, 0, 2.58, 0, g);
  return g;
}
function cubeTreeWithTopiary(x, z) {
  const g = cubeTree(x, z, 1, 1);
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    box(0.28, 0.28, 0.28, mats.grass, Math.cos(a) * 0.24, 2.07 + (i % 2) * 0.16, Math.sin(a) * 0.24, g);
  }
  box(0.36, 0.36, 0.36, mats.grass3, 0, 2.38, 0, g);
  box(0.78, 0.1, 0.78, mats.stone, 0, 0.05, 0, g);
}
function pineTree(x, z, scale = 1) {
  const g = makeGroup(x, z, scale);
  cyl(0.16, 0.2, 1.0, 4, mats.trunk, 0, 0.5, 0, g).rotation.y = Math.PI / 4;
  const c1 = cone(0.9, 0.9, 4, mats.grass2, 0, 1.15, 0, g); c1.rotation.y = Math.PI / 4;
  const c2 = cone(0.68, 0.8, 4, mats.grass, 0, 1.75, 0, g); c2.rotation.y = Math.PI / 4;
  const c3 = cone(0.45, 0.72, 4, mats.grass3, 0, 2.3, 0, g); c3.rotation.y = Math.PI / 4;
}
function roundTree(x, z, scale = 1) {
  const g = makeGroup(x, z, scale);
  cyl(0.14, 0.18, 0.95, 6, mats.trunk, 0, 0.47, 0, g);
  sphere(0.62, mats.grass2, 0, 1.18, 0, g, [1, 0.9, 1]);
}
function slimTree(x, z, scale = 1) {
  const g = makeGroup(x, z, scale);
  cyl(0.13, 0.16, 1.45, 4, mats.trunk, 0, 0.72, 0, g).rotation.y = Math.PI / 4;
  box(0.62, 0.8, 0.62, mats.grass, 0, 1.62, 0, g);
  box(0.48, 0.42, 0.48, mats.grass3, 0, 2.2, 0, g);
}

// Rocks.
function rockCluster(x, z, scale = 1) {
  const g = makeGroup(x, z, scale);
  sphere(0.48, mats.stone, -0.18, 0.35, 0, g, [1.2, 0.7, 0.95]);
  sphere(0.36, mats.stoneDark, 0.38, 0.32, 0.05, g, [1.0, 0.72, 0.85]);
  sphere(0.15, mats.stone, 0.22, 0.12, 0.55, g, [1.2, 0.55, 0.8]);
}

// Bushes.
function bush(x, z, scale = 1, clustered = false) {
  const g = makeGroup(x, z, scale);
  if (clustered) {
    sphere(0.34, mats.grass2, -0.28, 0.32, 0, g, [1, 0.75, 1]);
    sphere(0.38, mats.grass, 0.05, 0.38, 0.05, g, [1, 0.75, 1]);
    sphere(0.28, mats.grass3, 0.36, 0.28, 0.08, g, [1, 0.7, 1]);
  } else {
    box(0.72, 0.52, 0.72, mats.grass, 0, 0.28, 0, g);
    box(0.44, 0.34, 0.44, mats.grass3, 0, 0.72, 0, g);
  }
}

// Fence pieces.
function fenceSegment(x, z, rot = 0, scale = 1) {
  const g = makeGroup(x, z, scale);
  g.rotation.y = rot;
  box(0.16, 0.78, 0.16, mats.wood, -0.65, 0.39, 0, g);
  box(0.16, 0.78, 0.16, mats.wood, 0.65, 0.39, 0, g);
  box(1.45, 0.14, 0.12, mats.woodLight, 0, 0.28, 0, g);
  box(1.45, 0.14, 0.12, mats.woodLight, 0, 0.58, 0, g);
}
function fenceCorner(x, z) {
  fenceSegment(x, z, 0, 1);
  fenceSegment(x + 0.65, z - 0.65, Math.PI / 2, 1);
}

// Reeds / wheat.
function reed(x, z, height = 1, scale = 1) {
  const g = makeGroup(x, z, scale);
  cyl(0.035, 0.04, 0.95 * height, 6, mats.stem, 0, 0.48 * height, 0, g);
  cyl(0.11, 0.11, 0.62, 8, mats.reed, 0, 1.08 * height, 0, g);
  box(0.12, 0.12, 0.12, mats.reed, 0, 1.42 * height, 0, g);
}
function reedPatch(x, z, count = 6) {
  const g = makeGroup(x, z, 1);
  for (let i = 0; i < count; i++) {
    const px = (i % 4) * 0.36 - 0.54;
    const pz = Math.floor(i / 4) * 0.42 - 0.18;
    const r = new THREE.Group();
    r.position.set(px, 0, pz);
    g.add(r);
    cyl(0.03, 0.035, 0.85 + (i % 3) * 0.22, 6, mats.stem, 0, 0.45, 0, r);
    cyl(0.1, 0.1, 0.52, 8, mats.reed, 0, 1.0 + (i % 3) * 0.18, 0, r);
  }
}

// Mushrooms and flowers.
function mushroom(x, z, scale = 1) {
  const g = makeGroup(x, z, scale);
  cyl(0.12, 0.18, 0.42, 8, mats.mushroomStem, 0, 0.22, 0, g);
  sphere(0.48, mats.mushroom, 0, 0.55, 0, g, [1.15, 0.5, 1.05]);
}
function sunflower(x, z, scale = 1) {
  const g = makeGroup(x, z, scale);
  cyl(0.035, 0.04, 1.1, 8, mats.stem, 0, 0.55, 0, g);
  cyl(0.22, 0.22, 0.08, 12, mats.flower, 0, 1.17, 0, g).rotation.x = Math.PI / 2;
  cyl(0.09, 0.09, 0.1, 12, mats.flowerCenter, 0, 1.18, 0, g).rotation.x = Math.PI / 2;
}
function tinySapling(x, z) {
  const g = makeGroup(x, z, 1);
  cyl(0.06, 0.08, 0.55, 5, mats.trunk, 0, 0.28, 0, g);
  box(0.28, 0.28, 0.28, mats.grass, 0, 0.66, 0, g);
  box(0.22, 0.22, 0.22, mats.grass3, 0.18, 0.5, 0.05, g);
}

// Cactus-like grasses.
function grassClump(x, z) {
  const g = makeGroup(x, z, 1);
  for (let i = 0; i < 5; i++) {
    const px = (i - 2) * 0.17;
    cyl(0.035, 0.04, 0.45 + i * 0.08, 6, mats.stem, px, 0.25 + i * 0.04, Math.sin(i) * 0.14, g);
    box(0.12, 0.16, 0.12, mats.grass, px, 0.55 + i * 0.05, Math.sin(i) * 0.14, g);
  }
}

// Animal miniatures.
function animalBase(x, z, water = false, scale = 0.82) {
  const g = makeGroup(x, z, scale);
  box(2.15, 0.26, 1.6, mats.tileDirt, 0, 0.13, 0, g, 0.08);
  box(1.98, 0.16, 1.44, water ? mats.water : mats.grass, 0, 0.34, 0, g, 0.1);
  if (water) {
    box(0.7, 0.04, 0.34, mats.waterDark, -0.45, 0.45, 0.38, g, 0.04);
    box(0.48, 0.04, 0.28, mats.waterDark, 0.52, 0.45, -0.34, g, 0.04);
  } else {
    grassClumpAt(g, -0.66, 0.44, 0.56);
    box(0.24, 0.12, 0.18, mats.stone, 0.66, 0.46, 0.42, g, 0.04);
  }
  g.userData.blockyAnimal = true;
  return g;
}
function grassClumpAt(parent, x, z, scale = 1) {
  for (let i = 0; i < 3; i++) {
    box(0.08 * scale, (0.22 + i * 0.06) * scale, 0.08 * scale, mats.grass2, x + i * 0.11 * scale, 0.48 + i * 0.03 * scale, z + Math.sin(i) * 0.05 * scale, parent, 0.02);
  }
}
function eyePair(parent, x, y, z, dx = 0.12, mat = mats.black) {
  box(0.055, 0.07, 0.035, mat, x - dx, y, z, parent, 0.01);
  box(0.055, 0.07, 0.035, mat, x + dx, y, z, parent, 0.01);
}
function legPair(parent, x, z, mat, h = 0.55) {
  box(0.15, h, 0.15, mat, x, 0.48 + h * 0.5, z, parent, 0.035);
}
function fourLegs(parent, mat, h = 0.48) {
  legPair(parent, -0.38, -0.28, mat, h);
  legPair(parent, 0.38, -0.28, mat, h);
  legPair(parent, -0.38, 0.32, mat, h);
  legPair(parent, 0.38, 0.32, mat, h);
}
function ear(parent, x, y, z, mat, tall = false) {
  const e = box(tall ? 0.12 : 0.16, tall ? 0.52 : 0.26, 0.1, mat, x, y, z, parent, 0.025);
  e.rotation.x = tall ? -0.18 : 0;
  return e;
}
function tail(parent, x, y, z, mat, long = false) {
  const t = box(long ? 0.16 : 0.12, long ? 0.22 : 0.14, long ? 0.55 : 0.32, mat, x, y, z, parent, 0.035);
  t.rotation.x = long ? -0.58 : -0.32;
  return t;
}
function stripe(parent, x, y, z, mat, vertical = true) {
  box(vertical ? 0.07 : 0.36, vertical ? 0.38 : 0.07, 0.045, mat, x, y, z, parent, 0.01);
}
function spot(parent, x, y, z, mat) {
  box(0.24, 0.2, 0.05, mat, x, y, z, parent, 0.04);
}
function quadruped(x, z, cfg) {
  const g = animalBase(x, z, false, cfg.scale || 0.82);
  box(cfg.bodyW || 0.64, cfg.bodyH || 0.55, cfg.bodyD || 0.95, cfg.body, 0, 0.98, 0.02, g, 0.1);
  box(cfg.headW || 0.42, cfg.headH || 0.42, cfg.headD || 0.42, cfg.head || cfg.body, 0, 1.08, -0.48, g, 0.08);
  if (cfg.snout) box(0.28, 0.18, 0.18, cfg.snout, 0, 1.02, -0.76, g, 0.04);
  eyePair(g, 0, 1.14, -0.7, cfg.eyeDx || 0.11);
  fourLegs(g, cfg.leg || cfg.body, cfg.legH || 0.5);

// Basic part editor.
const editor = {
  editMode: false,
  selectedObject: null,
  selectedPart: null,
  pointerDown: null
};
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const objectBox = new THREE.BoxHelper(new THREE.Group(), 0xffc13b);
const partBox = new THREE.BoxHelper(new THREE.Group(), 0x2f7bff);
objectBox.visible = false;
partBox.visible = false;
scene.add(objectBox);
scene.add(partBox);

const editorStatus = document.getElementById('editorStatus');
const editButton = document.getElementById('editButton');
const resetButton = document.getElementById('resetButton');
const editorInputs = {
  sizeX: document.getElementById('sizeX'),
  sizeY: document.getElementById('sizeY'),
  sizeZ: document.getElementById('sizeZ'),
  posX: document.getElementById('posX'),
  posY: document.getElementById('posY'),
  posZ: document.getElementById('posZ')
};
const allInputs = Object.values(editorInputs);

function formatNumber(value) {
  return Number.isFinite(value) ? value.toFixed(2) : '0.00';
}
function objectName(object) {
  return object && object.userData.editorName ? object.userData.editorName : 'Object';
}
function partName(part) {
  return part && part.userData.editorPart ? part.userData.editorPart.type : 'part';
}
function editableMeshes(object) {
  const meshes = [];
  if (!object) return meshes;
  object.traverse((child) => {
    if (child.isMesh && child.userData.editorPart && child.material !== mats.shadow) {
      meshes.push(child);
    }
  });
  return meshes;
}
function topLevelObjectFor(mesh) {
  let current = mesh;
  while (current && current.parent && current.parent !== root) current = current.parent;
  return current && current.parent === root && current.isGroup ? current : null;
}
function updateEditorBoxes() {
  objectBox.visible = !!editor.selectedObject;
  partBox.visible = !!editor.selectedPart;
  if (editor.selectedObject) objectBox.setFromObject(editor.selectedObject);
  if (editor.selectedPart) partBox.setFromObject(editor.selectedPart);
}
function setInputsEnabled(enabled) {
  allInputs.forEach((input) => {
    input.disabled = !enabled;
  });
  resetButton.disabled = !enabled;
}
function fillPartInputs() {
  const part = editor.selectedPart;
  if (!part || !part.userData.editorPart) {
    allInputs.forEach((input) => {
      input.value = '';
    });
    setInputsEnabled(false);
    return;
  }
  const data = part.userData.editorPart;
  editorInputs.sizeX.value = formatNumber(data.width * part.scale.x);
  editorInputs.sizeY.value = formatNumber(data.height * part.scale.y);
  editorInputs.sizeZ.value = formatNumber(data.depth * part.scale.z);
  editorInputs.posX.value = formatNumber(part.position.x);
  editorInputs.posY.value = formatNumber(part.position.y);
  editorInputs.posZ.value = formatNumber(part.position.z);
  setInputsEnabled(true);
}
function refreshEditorPanel() {
  editButton.disabled = !editor.selectedObject;
  editButton.setAttribute('aria-pressed', editor.editMode ? 'true' : 'false');
  editButton.textContent = editor.editMode ? 'Done' : 'Edit';
  if (!editor.selectedObject) {
    editorStatus.textContent = 'Click an object to select it.';
  } else if (!editor.editMode) {
    editorStatus.textContent = `${objectName(editor.selectedObject)} selected. Press Edit to change parts.`;
  } else if (!editor.selectedPart) {
    editorStatus.textContent = `Editing ${objectName(editor.selectedObject)}. Click one of its parts.`;
  } else {
    editorStatus.textContent = `Editing ${partName(editor.selectedPart)} in ${objectName(editor.selectedObject)}.`;
  }
  fillPartInputs();
  updateEditorBoxes();
}
function selectObject(object) {
  editor.selectedObject = object;
  editor.selectedPart = null;
  editor.editMode = false;
  controls.enabled = true;
  refreshEditorPanel();
}
function selectPart(part) {
  editor.selectedPart = part;
  refreshEditorPanel();
}
function getIntersections(event, candidates) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  return raycaster.intersectObjects(candidates, true);
}
function handleCanvasClick(event) {
  if (event.target !== renderer.domElement) return;
  if (editor.editMode && editor.selectedObject) {
    const hit = getIntersections(event, editableMeshes(editor.selectedObject))[0];
    if (hit) selectPart(hit.object);
    return;
  }
  const meshes = [];
  root.children.forEach((child) => {
    if (child.isGroup) meshes.push(...editableMeshes(child));
  });
  const hit = getIntersections(event, meshes)[0];
  selectObject(hit ? topLevelObjectFor(hit.object) : null);
}
function applyPartInputs() {
  const part = editor.selectedPart;
  if (!part || !part.userData.editorPart) return;
  const data = part.userData.editorPart;
  const sx = Math.max(0.02, parseFloat(editorInputs.sizeX.value) || data.width);
  const sy = Math.max(0.02, parseFloat(editorInputs.sizeY.value) || data.height);
  const sz = Math.max(0.02, parseFloat(editorInputs.sizeZ.value) || data.depth);
  part.scale.set(sx / data.width, sy / data.height, sz / data.depth);
  part.position.set(
    parseFloat(editorInputs.posX.value) || 0,
    parseFloat(editorInputs.posY.value) || 0,
    parseFloat(editorInputs.posZ.value) || 0
  );
  updateEditorBoxes();
}
function resetSelectedPart() {
  const part = editor.selectedPart;
  if (!part || !part.userData.editorPart) return;
  const data = part.userData.editorPart;
  part.scale.copy(data.initialScale);
  part.position.copy(data.initialPosition);
  refreshEditorPanel();
}

editButton.addEventListener('click', () => {
  if (!editor.selectedObject) return;
  editor.editMode = !editor.editMode;
  editor.selectedPart = null;
  controls.enabled = !editor.editMode;
  refreshEditorPanel();
});
resetButton.addEventListener('click', resetSelectedPart);
allInputs.forEach((input) => input.addEventListener('input', applyPartInputs));
renderer.domElement.addEventListener('pointerdown', (event) => {
  editor.pointerDown = { x: event.clientX, y: event.clientY };
});
renderer.domElement.addEventListener('pointerup', (event) => {
  if (!editor.pointerDown) return;
  const dx = event.clientX - editor.pointerDown.x;
  const dy = event.clientY - editor.pointerDown.y;
  editor.pointerDown = null;
  if (Math.hypot(dx, dy) > 5) return;
  handleCanvasClick(event);
});
refreshEditorPanel();

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, renderer.info.render.frame ? 0.016 : 0.016);
  t += dt;
  updateEditorBoxes();
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
