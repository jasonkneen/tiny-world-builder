<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyWorld — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede0;
    --panel: #ffffff;
    --ink: #2a2722;
    --muted: #6f695f;
    --line: #ebe3d2;
    --line-soft: #f3ecdc;
    --accent: #3a72c8;
    --accent-2: #e8532a;
    --accent-3: #2db37c;
    --shadow: 0 18px 50px -20px rgba(50,35,10,0.18), 0 2px 6px -2px rgba(50,35,10,0.08);
    --shadow-sm: 0 2px 8px -2px rgba(50,35,10,0.12);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --display-font: 'Pixelify Sans', ui-monospace, 'SF Mono', Menlo, monospace;
    --body-font: 'Space Grotesk', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 86% 15%, rgba(255,214,154,0.45), transparent 32%),
      radial-gradient(circle at 18% 18%, rgba(26,103,210,0.45), transparent 36%),
      radial-gradient(circle at 70% 86%, rgba(255,188,126,0.18), transparent 36%),
      linear-gradient(135deg, rgb(106,168,235) 0%, rgb(188,220,244) 48%, #fff0d1 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--body-font);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(circle at 18% 74%, rgba(255,255,255,0.62), transparent 28%),
      radial-gradient(circle at 92% 84%, rgba(255,240,209,0.58), transparent 30%),
      radial-gradient(ellipse at center, rgba(5,10,20,0) 50%, rgba(5,10,20,0.12) 100%);
  }

  /* CONFETTI CANVAS */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* MAIN LAYOUT */
  .mc-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 20px 48px;
  }

  /* HEADER */
  .mc-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .mc-header-text { flex: 1; min-width: 260px; }

  .mc-title {
    font-family: var(--display-font);
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.01em;
    line-height: 1.1;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }

  .mc-headline {
    font-size: 0.95rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 400;
  }

  .mc-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .wave-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    font-family: var(--display-font);
    font-size: 0.85rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    letter-spacing: 0.04em;
  }

  .countdown-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-family: var(--display-font);
    font-size: 0.82rem;
    color: var(--ink);
    backdrop-filter: blur(4px);
  }

  .countdown-wrap svg { flex-shrink: 0; }

  #countdown-timer { font-weight: 700; color: var(--accent); }

  .updated-wrap {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  /* HERO PET */
  .hero-pet-area {
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    min-width: 100px;
    flex-shrink: 0;
    position: relative;
  }

  .hero-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--display-font);
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
    text-align: center;
  }

  /* STAT TILES */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-tile {
    background: var(--panel);
    border-radius: var(--radius-lg);
    padding: 16px 14px 14px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .stat-tile::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--tile-accent, var(--accent));
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .stat-tile:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .stat-number {
    font-family: var(--display-font);
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.2;
  }

  .stat-icon { color: var(--muted); flex-shrink: 0; }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--panel);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .progress-label {
    font-family: var(--display-font);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
    min-width: 120px;
  }

  .progress-bar-track {
    flex: 1;
    height: 16px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    min-width: 100px;
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #55a0f0 100%);
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 8px,
      rgba(255,255,255,0.2) 8px, rgba(255,255,255,0.2) 12px
    );
    animation: stripe-scroll 1.2s linear infinite;
  }

  @keyframes stripe-scroll {
    from { background-position-x: 0; }
    to   { background-position-x: 20px; }
  }

  .progress-pct {
    font-family: var(--display-font);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  /* MAIN CONTENT GRID */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .content-grid { grid-template-columns: 1fr; }
  }

  /* KANBAN */
  .kanban-section {
    background: var(--panel);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
  }

  .section-title {
    font-family: var(--display-font);
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .kanban-columns {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .kanban-col {
    background: var(--line-soft);
    border-radius: var(--radius-md);
    padding: 10px 8px;
    min-height: 80px;
  }

  .kanban-col-header {
    font-family: var(--display-font);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stage-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .kanban-cards { display: flex; flex-direction: column; gap: 6px; }

  /* FEATURE CARD */
  .feat-card {
    background: var(--panel);
    border-radius: var(--radius-sm);
    padding: 8px 8px 6px;
    border: 1px solid var(--line);
    box-shadow: 0 1px 3px rgba(50,35,10,0.07);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    position: relative;
  }

  .feat-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(50,35,10,0.12);
  }

  .feat-card.blocked {
    border-color: #e8532a;
    background: #fff8f6;
  }

  .feat-card.shipped {
    border-color: #2db37c;
    background: #f4fbf7;
  }

  .feat-card-top {
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }

  .feat-card-pet {
    flex-shrink: 0;
    width: 40px;
    height: 43px;
    position: relative;
    overflow: hidden;
  }

  .feat-card-info { flex: 1; min-width: 0; }

  .feat-id {
    font-family: var(--display-font);
    font-size: 0.62rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 2px;
  }

  .feat-title {
    font-size: 0.72rem;
    color: var(--ink);
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .feat-chips {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .model-chip {
    font-family: var(--display-font);
    font-size: 0.55rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .model-chip.opus   { background: #ede0ff; color: #6b2fc9; }
  .model-chip.sonnet { background: #ddeeff; color: #1a5da0; }
  .model-chip.haiku  { background: #d8f5e4; color: #1a7a4a; }

  .blocked-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #ffe8e0;
    color: var(--accent-2);
    font-family: var(--display-font);
    font-size: 0.55rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .shipped-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #d8f5e4;
    color: var(--accent-3);
    font-family: var(--display-font);
    font-size: 0.55rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  /* BLOCKED LANE */
  .blocked-lane {
    background: #fff3ef;
    border: 1.5px dashed #e8532a;
    border-radius: var(--radius-md);
    padding: 10px 8px;
    margin-top: 14px;
  }

  .blocked-lane .kanban-col-header { color: var(--accent-2); border-color: #f5c4b4; }

  /* ACTIVITY FEED */
  .feed-section {
    background: var(--panel);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .feed-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 480px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .feed-list::-webkit-scrollbar { width: 4px; }
  .feed-list::-webkit-scrollbar-track { background: var(--line-soft); border-radius: 99px; }
  .feed-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

  .feed-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
    align-items: flex-start;
  }

  .feed-item:last-child { border-bottom: none; }

  .feed-kind {
    flex-shrink: 0;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: var(--display-font);
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .feed-kind.system { background: var(--line); color: var(--muted); }
  .feed-kind.scout  { background: #ddeeff; color: #1a5da0; }
  .feed-kind.build  { background: #d8f5e4; color: #1a7a4a; }
  .feed-kind.ship   { background: #fff0cc; color: #9a6200; }
  .feed-kind.error  { background: #ffe8e0; color: #c0391a; }
  .feed-kind.pr     { background: #ede0ff; color: #6b2fc9; }
  .feed-kind.review { background: #fff3ef; color: #c05a1a; }

  .feed-body { flex: 1; }

  .feed-text {
    font-size: 0.78rem;
    color: var(--ink);
    line-height: 1.45;
  }

  .feed-time {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* PET SPRITE */
  .pet-sprite {
    display: block;
    width: 100%;
    height: 100%;
    background-image: url('/models/pets/boba/spritesheet.webp');
    background-repeat: no-repeat;
    image-rendering: pixelated;
  }

  /* HERO PET SIZING */
  .hero-pet-area .pet-sprite-wrap {
    width: 80px;
    height: 87px; /* 80 * (208/192) */
    position: relative;
    overflow: hidden;
    filter: drop-shadow(0 4px 8px rgba(50,35,10,0.15));
  }

  /* GROUND / CONVEYOR */
  .conveyor-section {
    background: var(--panel);
    border-radius: var(--radius-lg);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    padding: 16px 18px;
    margin-top: 20px;
    overflow: hidden;
  }

  .conveyor-belt {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
  }

  .conveyor-belt::-webkit-scrollbar { height: 4px; }
  .conveyor-belt::-webkit-scrollbar-track { background: var(--line-soft); border-radius: 99px; }
  .conveyor-belt::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

  .conveyor-item {
    flex-shrink: 0;
    width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .conveyor-pet-wrap {
    width: 60px;
    height: 65px;
    position: relative;
    overflow: hidden;
  }

  .conveyor-label {
    font-family: var(--display-font);
    font-size: 0.58rem;
    text-align: center;
    color: var(--muted);
    line-height: 1.2;
    max-width: 78px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
  }

  .conveyor-track {
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      var(--line) 0px, var(--line) 12px,
      var(--line-soft) 12px, var(--line-soft) 18px
    );
    border-radius: 4px;
    margin-top: 4px;
    animation: track-move 0.8s linear infinite;
  }

  @keyframes track-move {
    from { background-position: 0; }
    to   { background-position: 18px; }
  }

  /* PULSE DOT for live indicator */
  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-3);
    box-shadow: 0 0 0 0 rgba(45,179,124,0.4);
    animation: live-pulse 1.8s ease-in-out infinite;
  }

  @keyframes live-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(45,179,124,0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(45,179,124,0); }
    100% { box-shadow: 0 0 0 0 rgba(45,179,124,0); }
  }

  /* STAGE COLOR MAP */
  .stage-queued    { background: #c8c0b4; }
  .stage-spec      { background: #9b8ad4; }
  .stage-build     { background: #4a9de8; }
  .stage-review    { background: #e8a330; }
  .stage-test      { background: #45b886; }
  .stage-pr        { background: #a06ad4; }
  .stage-shipped   { background: #2db37c; }
  .stage-blocked   { background: #e8532a; }

  /* SPARKLE BURST (CSS) */
  @keyframes sparkle-pop {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    50%  { transform: scale(1.4) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    animation: sparkle-pop 0.6s ease-out forwards;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="mc-wrap">

  <!-- HEADER -->
  <div class="mc-header">
    <div class="mc-header-text">
      <div class="mc-title">TinyWorld Mission Control</div>
      <div class="mc-headline" id="headline">Loading...</div>
      <div class="mc-meta">
        <span class="wave-badge" id="wave-badge">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <polygon points="5,0 10,10 0,10" fill="white"/>
          </svg>
          <span id="wave-label">WAVE ?</span>
        </span>
        <span class="countdown-wrap">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 3v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="countdown-timer">--d --h --m</span>
        </span>
        <span class="updated-wrap">
          <span class="live-dot"></span>
          <span id="last-updated">loading...</span>
        </span>
      </div>
    </div>
    <div class="hero-pet-area" id="hero-pet-area">
      <div class="pet-sprite-wrap" id="hero-pet-wrap">
        <div class="pet-sprite" id="hero-pet"></div>
      </div>
      <div class="hero-label" id="hero-pet-label">Boba — standing by</div>
    </div>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid">
    <div class="stat-tile" style="--tile-accent:#2db37c">
      <svg class="stat-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 9l4 4 8-8" stroke="#2db37c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="stat-number" id="stat-shipped">0</div>
      <div class="stat-label">Shipped</div>
    </div>
    <div class="stat-tile" style="--tile-accent:#4a9de8">
      <svg class="stat-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7" stroke="#4a9de8" stroke-width="2"/>
        <path d="M9 5v4l3 2" stroke="#4a9de8" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="stat-number" id="stat-inprogress">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-tile" style="--tile-accent:#c8c0b4">
      <svg class="stat-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="4" width="14" height="2.5" rx="1" fill="#c8b4a0"/>
        <rect x="2" y="8" width="10" height="2.5" rx="1" fill="#c8b4a0"/>
        <rect x="2" y="12" width="12" height="2.5" rx="1" fill="#c8b4a0"/>
      </svg>
      <div class="stat-number" id="stat-queued">0</div>
      <div class="stat-label">Queued</div>
    </div>
    <div class="stat-tile" style="--tile-accent:#a06ad4">
      <svg class="stat-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 14l1.5-4 2.5 2.5L12 6l2 8" stroke="#a06ad4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="stat-number" id="stat-prs-merged">0</div>
      <div class="stat-label">PRs Merged</div>
    </div>
    <div class="stat-tile" style="--tile-accent:#e8a330">
      <svg class="stat-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">

// PET SPRITE ENGINE
// ============================================================
const PET_META = {
  frame: { width: 192, height: 208, columns: 8, rows: 9 },
  animations: {
    idle:       { frames: [0,1,2,3,4,5], fps: 5, loop: true },
    move_left:  { frames: [8,9,10,11,12,13,14,15], fps: 10, loop: true },
    move_right: { frames: [16,17,18,19,20,21,22,23], fps: 10, loop: true },
    wave:       { frames: [24,25,26,27], fps: 7, loop: false, fallback: 'idle' },
    sit:        { frames: [32,33,34,35,36], fps: 6, loop: true },
    sad:        { frames: [40,41,42,43,44,45,46], fps: 6, loop: true },
    sleep:      { frames: [43,44,47], fps: 3, loop: true },
    sip:        { frames: [48,49,50,51,52,53], fps: 8, loop: false, fallback: 'idle' },
    bounce:     { frames: [56,57,58,59,60,61], fps: 9, loop: false, fallback: 'idle' },
    grumpy:     { frames: [64,65,66,67,68,69], fps: 6, loop: false, fallback: 'idle' }
  }
};

// mood -> animation name resolver
function moodToAnim(mood) {
  const map = {
    idle:  'idle',
    move:  'move_right',
    wave:  'wave',
    sit:   'sit',
    sad:   'sad',
    sleep: 'sleep'
  };
  return map[mood] || 'idle';
}

// All active PetSprite instances — driven by one shared rAF loop
const ALL_PETS = [];

class PetSprite {
  constructor(el, animName, scale) {
    // el: the .pet-sprite div element
    // scale: rendered width in px (height = width * 208/192)
    this.scale = scale || 60;
    this.frameIdx = 0;     // index within current anim's frames array
    this.lastTick = 0;
    this.animName = null;
    this.anim = null;
    this.fw = 0;
    this.fh = 0;

    this.attach(el);
    this.setAnim(animName || 'idle');
    ALL_PETS.push(this);
  }

  // Apply ALL per-element sprite styles + dimensions. MUST be called every time the
  // board re-renders and hands us a fresh element — otherwise the new node keeps
  // background-size:auto and renders the whole 1536x1872 sheet inside a 60px box (the
  // garbled-sprite bug). Pixel-exact sizing (cell = w x h, not percentages) also
  // eliminates sub-pixel neighbour-frame bleed.
  attach(el) {
    this.el = el;
    if (!el) return;
    const { columns, rows } = PET_META.frame;
    const w = Math.round(this.scale);
    const h = Math.round(this.scale * (208 / 192));
    this.fw = w;
    this.fh = h;
    el.style.backgroundImage = "url('/models/pets/boba/spritesheet.webp')";
    el.style.backgroundRepeat = 'no-repeat';
    el.style.imageRendering = 'pixelated';
    el.style.width = `${w}px`;
    el.style.height = `${h}px`;
    el.style.backgroundSize = `${w * columns}px ${h * rows}px`;
    this._applyFrame();
  }

  setAnim(name) {
    if (this.animName === name && this.anim) return;
    const anim = PET_META.animations[name] || PET_META.animations['idle'];
    this.animName = name;
    this.anim = anim;
    this.frameIdx = 0;
    this.lastTick = performance.now();
    this._applyFrame();
  }

  tick(now) {
    const { fps, frames, loop, fallback } = this.anim;
    const interval = 1000 / fps;
    if (now - this.lastTick < interval) return;
    this.lastTick = now;
    this.frameIdx++;
    if (this.frameIdx >= frames.length) {
      if (loop === false) {
        // play once then fall back
        if (fallback) {
          this.setAnim(fallback);
          return;
        }
        this.frameIdx = frames.length - 1;
      } else {
        this.frameIdx = 0;
      }
    }
    this._applyFrame();
  }

  _applyFrame() {
    if (!this.el || !this.anim) return;
    const { columns } = PET_META.frame;
    const frameIndex = this.anim.frames[this.frameIdx] || 0;
    const col = frameIndex % columns;
    const row = Math.floor(frameIndex / columns);
    // Pixel-exact offset into the sheet: each cell is exactly fw x fh.
    this.el.style.backgroundPosition = `${-col * this.fw}px ${-row * this.fh}px`;
  }

  destroy() {
    const i = ALL_PETS.indexOf(this);
    if (i !== -1) ALL_PETS.splice(i, 1);
  }
}

// Shared animation loop — rAF when visible, setInterval fallback when tab is hidden
function rafLoop(now) {
  for (let i = 0; i < ALL_PETS.length; i++) ALL_PETS[i].tick(now);
  requestAnimationFrame(rafLoop);
}
requestAnimationFrame(rafLoop);

// Fallback interval that fires even in background tabs (rAF freezes when hidden)
setInterval(() => {
  if (document.hidden) {
    const now = performance.now();
    for (let i = 0; i < ALL_PETS.length; i++) ALL_PETS[i].tick(now);
  }
}, 100);

const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let confettiRunning = false;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function launchConfetti() {
  if (confettiRunning) return;
  confettiRunning = true;
  const colors = ['#3a72c8','#2db37c','#e8a330','#e8532a','#9b8ad4','#fff'];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      r: Math.random() * 5 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.15,
      life: 1.0,
      decay: Math.random() * 0.008 + 0.004
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    for (const p of particles) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.08; // gravity
      p.rot += p.rotV;
      p.life -= p.decay;
      if (p.life <= 0) continue;
      alive++;
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.6);
      ctx.restore();
    }
    if (alive > 0) {
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
      confettiRunning = false;
    }
  }
  draw();
}

function relativeTime(isoStr) {
  const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 5) return 'just now';
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function countdown(isoStr) {
  const diff = new Date(isoStr).getTime() - Date.now();
  if (diff <= 0) return 'deadline passed';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  return `${m}m ${s}s`;
}

// Track conveyor pet instances keyed by feature id
const conveyorPets = {};

function renderConveyor(pipeline) {
  const active = pipeline.filter(f => f.status === 'in_progress' || f.status === 'blocked');
  const belt = document.getElementById('conveyor-belt');

  // Remove pets for features no longer active

    }
  }

// Kanban
// Track per-card pet instances keyed by feature id
const kanbanPets = {};

const STAGES = ['queued','spec','build','review','test','pr','shipped'];
const STAGE_COLORS = {
  queued: '#c8c0b4', spec: '#9b8ad4', build: '#4a9de8',
  review: '#e8a330', test: '#45b886', pr: '#a06ad4',
  shipped: '#2db37c', blocked: '#e8532a'
};

function renderKanban(pipeline) {
  const colsEl    = document.getElementById('kanban-cols');
  const blockedEl = document.getElementById('blocked-lane');
  const blockedCards = document.getElementById('blocked-cards');

  // Destroy old pets not needed
  const pipelineIds = new Set(pipeline.map(f => f.id));
  for (const id in kanbanPets) {
    if (!pipelineIds.has(id)) {
      kanbanPets[id].destroy();
      delete kanbanPets[id];
    }
  }

  colsEl.innerHTML = '';
  blockedCards.innerHTML = '';

  // Non-blocked features by stage
  const byStage = {};
  STAGES.forEach(s => byStage[s] = []);
  const blocked = [];

  for (const feat of pipeline) {
    if (feat.status === 'blocked') {
      blocked.push(feat);
    } else {
      const stage = feat.stage in byStage ? feat.stage : 'queued';
      byStage[stage].push(feat);
    }
  }

  // Render stage columns
  for (const stage of STAGES) {
    if (byStage[stage].length === 0) continue;
    const col = document.createElement('div');
    col.className = 'kanban-col';

    const header = document.createElement('div');
    header.className = 'kanban-col-header';
    const dot = document.createElement('span');
    dot.className = `stage-dot stage-${stage}`;
    dot.style.background = STAGE_COLORS[stage];
    header.appendChild(dot);
    header.appendChild(document.createTextNode(stage.toUpperCase()));
    col.appendChild(header);

    const cards = document.createElement('div');
    cards.className = 'kanban-cards';

    for (const feat of byStage[stage]) {
      cards.appendChild(buildCard(feat));
    }

    col.appendChild(cards);
    colsEl.appendChild(col);
  }

  // Blocked lane
  if (blocked.length > 0) {
    blockedEl.style.display = 'block';
    for (const feat of blocked) {
      blockedCards.appendChild(buildCard(feat));
    }
  } else {
    blockedEl.style.display = 'none';
  }
}

function buildCard(feat) {
  const card = document.createElement('div');
  card.className = 'feat-card' + (feat.status === 'blocked' ? ' blocked' : '') + (feat.status === 'shipped' ? ' shipped' : '');

  const top = document.createElement('div');
  top.className = 'feat-card-top';

  // Pet
  const petWrap = document.createElement('div');
  petWrap.className = 'feat-card-pet';
  const petEl = document.createElement('div');
  petEl.className = 'pet-sprite';
  petWrap.appendChild(petEl);

  // Info
  const info = document.createElement('div');
  info.className = 'feat-card-info';

  const idEl = document.createElement('div');
  idEl.className = 'feat-id';
  idEl.textContent = feat.id;

  const titleEl = document.createElement('div');
  titleEl.className = 'feat-title';
  titleEl.textContent = feat.title;

  info.appendChild(idEl);
  info.appendChild(titleEl);

  top.appendChild(petWrap);
  top.appendChild(info);

  // Chips
  const chips = document.createElement('div');
  chips.className = 'feat-chips';

  const modelChip = document.createElement('span');
  modelChip.className = `model-chip ${feat.model}`;
  modelChip.textContent = feat.model;
  chips.appendChild(modelChip);

  if (feat.status === 'blocked') {
    const bc = document.createElement('span');
    bc.className = 'blocked-chip';
    bc.innerHTML = '<svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><path d="M4 0a4 4 0 100 8A4 4 0 004 0zm0 1.5a.75.75 0 01.75.75v2a.75.75 0 01-1.5 0v-2A.75.75 0 014 1.5zm0 5.25a.75.75 0 110-1.5.75.75 0 010 1.5z"/></svg> BLOCKED';
    chips.appendChild(bc);
  } else if (feat.status === 'shipped') {
    const sc = document.createElement('span');
    sc.className = 'shipped-chip';
    sc.innerHTML = '<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4l2 2 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> SHIPPED';
    chips.appendChild(sc);
  }

  card.appendChild(top);
  card.appendChild(chips);

  // Create or update pet sprite
  if (!kanbanPets[feat.id]) {
    kanbanPets[feat.id] = new PetSprite(petEl, moodToAnim(feat.mood), 40);
  } else {
    kanbanPets[feat.id].scale = 40;
    kanbanPets[feat.id].attach(petEl);
    kanbanPets[feat.id].setAnim(moodToAnim(feat.mood));
  }

  return card;
}

    const el = document.createElement('div');
    el.className = 'feed-item';

    const kind = document.createElement('span');
    kind.className = `feed-kind ${item.kind || 'system'}`;
    kind.textContent = item.kind || 'sys';

    const body = document.createElement('div');
    body.className = 'feed-body';

    const text = document.createElement('div');
    text.className = 'feed-text';
    text.textContent = item.text;

    const time = document.createElement('div');
    time.className = 'feed-time';
    time.textContent = relativeTime(item.ts);

    body.appendChild(text);
    body.appendChild(time);
    el.appendChild(kind);
    el.appendChild(body);
    list.appendChild(el);
  }
}

// ============================================================
// MAIN DATA CYCLE
// ============================================================
let prevShipped = null;
let isFirstLoad = true;

async function fetchData() {
  try {
    const res = await fetch('/plans/production-line/status.json', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.warn('[mission-control] fetch failed, using fallback data:', e.message);
    return FALLBACK_DATA;
  }
}

function render(data) {
  // Wave deadline
  if (!waveDeadline && data.waveDeadline) {
    waveDeadline = data.waveDeadline;
    startCountdown();
  }

  renderHeader(data);
  renderStats(data.stats);
  renderProgress(data.stats);
  renderConveyor(data.pipeline);
  renderKanban(data.pipeline);
  renderFeed(data.feed);

  // Confetti on new ships
  const shipped = data.stats.featuresShipped;
  if (!isFirstLoad && prevShipped !== null && shipped > prevShipped) {
    launchConfetti();
    // Also play hero bounce
    if (heroPet) { heroPet.setAnim('bounce'); }
  }
  prevShipped = shipped;
  isFirstLoad = false;
}

async function poll() {
  const data = await fetchData();
  render(data);
}

// Initial load
poll();

// Poll every 15 seconds
setInterval(poll, 15000);

// Update relative timestamps every 30s without re-fetching
setInterval(() => {
  // Refresh the "last updated" label using cached data
  // (not a full re-render; just the time labels that drift)
  // The next full poll handles the rest.
  const el = document.getElementById('last-updated');
  // We'll get updatedAt from the data we already rendered
  // (simplest: just re-trigger poll; it's cheap)
}, 30000);
</script>
